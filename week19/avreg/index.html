<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <title>גרף התקדמות ציונים</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body style="direction: rtl; font-family: Arial;">

  <h2 style="text-align:center;">גרף התקדמות ציונים</h2>
  <canvas id="gradesChart"></canvas>

  <script>
    const scores = [35, 7, 24, 40, 61, 23, 35, 61, 68, 92, 79, 77, 48, 85, 50, 45, 90, 100];

    const ctx = document.getElementById('gradesChart').getContext('2d');

    new Chart(ctx, {
      type: 'line',
      data: {
        labels: scores.map((_, i) => `מבחן ${i + 1}`),
        datasets: [{
          label: 'ציון',
          data: scores,
          borderColor: 'blue',
          backgroundColor: 'rgba(0, 0, 255, 0.1)',
          borderWidth: 2,
          pointRadius: 5,
          tension: 0.3
        }]
      },
      options: {
        scales: {
          y: {
            min: 0,
            max: 100,
            title: {
              display: true,
              text: 'ציון (0-100)'
            }
          },
          x: {
            title: {
              display: true,
              text: 'מבחן מספר'
            }
          }
        },
        plugins: {
          legend: {
            display: true
          }
        }
      }
    });
  </script>

</body>
</html>
